<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Congo flag colors: Green, Yellow, Red -->
  <!-- Shield background -->
  <defs>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E7C42;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FCD116;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B7222D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B7222D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a1922;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#B7222D" stroke-width="3"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#0E7C42" stroke-width="2"/>
  
  <!-- Flag diagonal stripe -->
  <clipPath id="innerCircle">
    <circle cx="100" cy="100" r="88"/>
  </clipPath>
  <g clip-path="url(#innerCircle)">
    <!-- Green triangle top-left -->
    <polygon points="0,0 200,0 0,200" fill="#0E7C42" opacity="0.1"/>
    <!-- Red triangle bottom-right -->
    <polygon points="200,0 200,200 0,200" fill="#B7222D" opacity="0.1"/>
    <!-- Yellow diagonal -->
    <polygon points="140,0 200,0 60,200 0,200" fill="#FCD116" opacity="0.12"/>
  </g>
  
  <!-- Central emblem - book/education -->
  <g transform="translate(100,85)">
    <!-- Open book -->
    <path d="M-30,10 C-30,-5 -15,-15 0,-10 C15,-15 30,-5 30,10 L30,25 C30,15 15,10 0,15 C-15,10 -30,15 -30,25 Z" fill="#B7222D" opacity="0.9"/>
    <!-- Book spine -->
    <line x1="0" y1="-10" x2="0" y2="15" stroke="white" stroke-width="1.5"/>
    <!-- Graduation cap -->
    <polygon points="0,-30 -25,-18 0,-6 25,-18" fill="#1a1a2e"/>
    <line x1="0" y1="-30" x2="0" y2="-20" stroke="#FCD116" stroke-width="2"/>
    <circle cx="0" cy="-31" r="2.5" fill="#FCD116"/>
    <line x1="25" y1="-18" x2="28" y2="-8" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="28" cy="-7" r="2" fill="#FCD116"/>
  </g>
  
  <!-- Text: AECC -->
  <text x="100" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="28" fill="#1a1a2e" letter-spacing="4">AECC</text>
  
  <!-- Curved text top -->
  <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#0E7C42" font-weight="600" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ÉTUDIANTS CONGOLAIS</textPath>
  </text>
  
  <!-- Curved text bottom -->
  <path id="bottomArc" d="M 35,110 A 68,68 0 0,0 165,110" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#B7222D" font-weight="600" letter-spacing="1.2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EN CHINE · 在华留学</textPath>
  </text>
  
  <!-- Stars decoration -->
  <circle cx="40" cy="100" r="3" fill="#FCD116"/>
  <circle cx="160" cy="100" r="3" fill="#FCD116"/>
</svg>
